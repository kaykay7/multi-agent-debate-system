services:
  - type: web
    name: multi-agent-debate
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: NODE_VERSION
        value: "20"
      - key: LLM_PROVIDER
        value: google
      - key: GOOGLE_API_KEY
        sync: false          # User enters this in Render dashboard
